<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSR AP Automation — Documentation Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f8fb;
    --surface: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --text-2: #475569;
    --text-3: #94a3b8;

    --workflow: #2563eb;
    --domain: #0d9488;
    --milestones: #7c3aed;
    --corpus: #d97706;
    --pipeline: #db2777;

    --tab-h: 64px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    overflow: hidden;
  }

  /* ===== TOP BAR ===== */
  .topbar {
    height: var(--tab-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: stretch;
    box-shadow: 0 1px 0 rgba(15,23,42,.04);
    position: relative;
    z-index: 10;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 24px;
    border-right: 1px solid var(--border);
    flex-shrink: 0;
  }
  .brand-mark {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--workflow), var(--milestones));
    border-radius: 9px;
    display: grid; place-items: center;
    color: white; font-weight: 800; font-size: 14px;
  }
  .brand-text { line-height: 1.15; }
  .brand-text strong {
    display: block;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -.2px;
    color: var(--text);
  }
  .brand-text small {
    display: block;
    font-weight: 500;
    color: var(--text-3);
    font-size: 10.5px;
    letter-spacing: .8px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .tabs {
    display: flex;
    gap: 0;
    flex: 1;
    overflow-x: auto;
    padding-right: 16px;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    appearance: none;
    background: none;
    border: 0;
    border-bottom: 3px solid transparent;
    padding: 0 22px;
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text-2);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    transition: color .15s, border-color .15s, background .15s;
    height: 100%;
  }
  .tab:hover {
    color: var(--text);
    background: rgba(15,23,42,.025);
  }
  .tab.active {
    color: var(--tab-c);
    border-bottom-color: var(--tab-c);
    background: rgba(15,23,42,.025);
  }
  .tab-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    display: grid; place-items: center;
    background: var(--tab-c);
    color: white;
    font-size: 11px;
    font-weight: 800;
    flex-shrink: 0;
    opacity: .85;
  }
  .tab.active .tab-icon { opacity: 1; }
  .tab[data-tab="workflow"]   { --tab-c: var(--workflow); }
  .tab[data-tab="domain"]     { --tab-c: var(--domain); }
  .tab[data-tab="milestones"] { --tab-c: var(--milestones); }
  .tab[data-tab="corpus"]     { --tab-c: var(--corpus); }
  .tab[data-tab="pipeline"]   { --tab-c: var(--pipeline); }

  /* ===== STAGE ===== */
  .stage {
    height: calc(100vh - var(--tab-h));
    width: 100%;
    position: relative;
    background: var(--bg);
  }
  .frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    background: var(--bg);
    display: none;
  }
  .frame.active { display: block; }

  .empty {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    color: var(--text-3);
    font-size: 14px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s;
  }
  .empty.show { opacity: 1; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--text-3);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 720px) {
    :root { --tab-h: auto; }
    .topbar { flex-direction: column; align-items: stretch; }
    .brand { border-right: 0; border-bottom: 1px solid var(--border); padding: 12px 18px; }
    .tabs { overflow-x: auto; padding: 4px 6px; }
    .tab { padding: 14px 16px; font-size: 12.5px; }
    .stage { height: calc(100vh - 116px); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">N</div>
    <div class="brand-text">
      <strong>NSR AP Automation</strong>
      <small>Documentation Hub</small>
    </div>
  </div>
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="workflow" data-src="solution-workflow.html" role="tab" aria-selected="true">
      <span class="tab-icon">S</span>
      <span>Solution Workflow</span>
    </button>
    <button class="tab" data-tab="domain" data-src="NSR_Current_Flow.html" role="tab">
      <span class="tab-icon">D</span>
      <span>Domain &amp; Current Flow</span>
    </button>
    <button class="tab" data-tab="milestones" data-src="NSR_SOW_Milestones.html" role="tab">
      <span class="tab-icon">M</span>
      <span>SOW Milestones</span>
    </button>
    <button class="tab" data-tab="corpus" data-src="NSR_Test_Corpus_Map.html" role="tab">
      <span class="tab-icon">C</span>
      <span>Test Corpus</span>
    </button>
    <button class="tab" data-tab="pipeline" data-src="sow-viz/index.html" role="tab">
      <span class="tab-icon">P</span>
      <span>Pipeline Visualizer</span>
    </button>
  </div>
</div>

<div class="stage" id="stage">
  <div class="empty" id="empty">
    <div class="spinner"></div>
    <div>Loading…</div>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const empty = document.getElementById('empty');
  const tabs = document.querySelectorAll('.tab');
  const order = ['workflow','domain','milestones','corpus','pipeline'];

  function showTab(name) {
    const tab = document.querySelector(`.tab[data-tab="${name}"]`);
    if (!tab) return;
    const src = tab.dataset.src;

    tabs.forEach(t => {
      t.classList.toggle('active', t === tab);
      t.setAttribute('aria-selected', t === tab ? 'true' : 'false');
    });

    stage.querySelectorAll('.frame').forEach(f => f.classList.remove('active'));

    let frame = stage.querySelector(`.frame[data-tab="${name}"]`);
    if (!frame) {
      empty.classList.add('show');
      frame = document.createElement('iframe');
      frame.className = 'frame';
      frame.dataset.tab = name;
      frame.src = src;
      frame.title = tab.textContent.trim();
      frame.addEventListener('load', () => {
        empty.classList.remove('show');
      }, { once: true });
      stage.appendChild(frame);
    }
    frame.classList.add('active');

    if (history.replaceState) {
      history.replaceState(null, '', `#${name}`);
    }
  }

  tabs.forEach(t => {
    t.addEventListener('click', () => showTab(t.dataset.tab));
  });

  const initial = (window.location.hash || '').replace('#', '') || 'workflow';
  showTab(order.includes(initial) ? initial : 'workflow');

  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'IFRAME') return;
    if (!['ArrowLeft','ArrowRight'].includes(e.key)) return;
    const cur = document.querySelector('.tab.active').dataset.tab;
    const i = order.indexOf(cur);
    const next = e.key === 'ArrowRight'
      ? order[(i + 1) % order.length]
      : order[(i - 1 + order.length) % order.length];
    showTab(next);
  });
</script>

</body>
</html>
